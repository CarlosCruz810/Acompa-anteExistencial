<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carlos Cruz | Acompañamiento Existencial</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #C5A059;
    --text: #F5F5F0;
}

/* FONDO MÁS CLARO Y PREMIUM */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: var(--text);

    background: linear-gradient(rgba(15,20,25,0.6), rgba(15,20,25,0.8)),
    url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=2000&auto=format&fit=crop');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* SECCIONES */
.section {
    max-width: 900px;
    margin: auto;
    padding: 100px 20px;
    text-align: center;
}

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* LOGO */
.logo-img {
    height: 45vh;
}

/* TEXTO */
.tagline {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    max-width: 650px;
    margin: 30px 0;
    line-height: 1.5;
}

h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
}

p {
    opacity: 0.85;
    line-height: 1.7;
    max-width: 600px;
    margin: auto;
}

/* BOTONES */
.btn {
    padding: 14px 40px;
    border: 1px solid rgba(255,255,255,0.3);
    text-decoration: none;
    color: var(--text);
    letter-spacing: 2px;
    font-size: 0.8rem;
    text-transform: uppercase;
    transition: 0.4s;
    display: inline-block;
}

.btn:hover {
    border-color: var(--gold);
    color: var(--gold);
}

/* WHATSAPP */
.whatsapp {
    margin-top: 20px;
}

.whatsapp a {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text);
    opacity: 0.8;
    transition: 0.3s;
}

.whatsapp a:hover {
    opacity: 1;
}

/* REDES */
.social {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 25px;
}

.social a {
    color: var(--text);
    text-decoration: none;
    font-size: 0.85rem;
    opacity: 0.7;
    transition: 0.3s;
}

.social a:hover {
    opacity: 1;
    color: var(--gold);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 60px;
    font-size: 0.7rem;
    opacity: 0.5;
}

/* RESPONSIVE */
@media(max-width:768px){
    .logo-img { height: 35vh; }
    .tagline { font-size: 1.5rem; }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <img src="logo.png" class="logo-img">

    <p class="tagline">
        Hay momentos en los que ya no se trata de seguir adelante…  
        sino de entender lo que permanece.
    </p>

    <!-- BOTÓN CALENDARIO -->
    <a href="TU_LINK_CALENDAR" class="btn">Agendar proceso</a>

    <!-- WHATSAPP -->
    <div class="whatsapp">
        <a href="https://wa.me/529984943352" target="_blank">
            <!-- ICONO -->
            <svg width="22" height="22" viewBox="0 0 32 32" fill="currentColor">
                <path d="M16 3C9.4 3 4 8.3 4 14.8c0 2.3.7 4.5 2 6.4L4 29l7.9-2.1c1.8 1 3.8 1.5 6.1 1.5 6.6 0 12-5.3 12-11.8S22.6 3 16 3z"/>
            </svg>
            Contacto directo
        </a>
    </div>

    <!-- REDES -->
    <div class="social">
        <a href="TU_FACEBOOK" target="_blank">Facebook</a>
        <a href="TU_INSTAGRAM" target="_blank">Instagram</a>
    </div>

</section>

<!-- MENSAJE -->
<section class="section">
    <p>
        Este espacio no es para todos.  
        Es para quienes están listos para dejar de evitar  
        y comenzar a comprender.
    </p>
</section>

<footer>
© 2026 · Acompañamiento Existencial · Cancún
</footer>

</body>
</html>
